name: Auto Release APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build_and_release:
    # Prevent infinite loops by skipping commits made by this workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'release-key.jks'
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create keystore.properties
        run: |
          echo "storeFile=release-key.jks" > keystore.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Increment Version
        id: bump_version
        run: |
          # Read current version name
          CURRENT_VERSION=$(grep 'versionName =' app/build.gradle.kts | sed 's/.*= "//;s/".*//')
          echo "Current Version: $CURRENT_VERSION"
          
          # Increment by 0.1
          NEW_VERSION=$(echo $CURRENT_VERSION | awk '{printf "%.1f", $1 + 0.1}')
          echo "New Version: $NEW_VERSION"
          
          # Update build.gradle.kts
          sed -i "s/versionName = \"$CURRENT_VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          
          # Output for next steps
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add app/build.gradle.kts
          # Add [skip ci] to prevent infinite loop
          git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin HEAD:master

      - name: Build Release APK & Bundle
        run: ./gradlew assembleRelease bundleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: Release v${{ steps.bump_version.outputs.new_version }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
